name: in_app_update_android
description: "A Flutter plugin for prompting users about Android in-app updates using Play Core API."
version: 1.0.8
repository: https://github.com/sajedur0/in_app_update_android
homepage: https://github.com/sajedur0/in_app_update_android

environment:
  sdk: ^3.12.2
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: in_app_update_android
        pluginClass: InAppUpdatePlugin

